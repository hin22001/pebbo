name: Deploy Pebbo

on:
  workflow_dispatch: # Manual trigger

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Install sshpass
        run: sudo apt-get update && sudo apt-get install -y sshpass

      - name: Set up SSH Agent (For Jump Host Authentication)
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add SSH Known Hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.JUMP_HOST_IP }} >> ~/.ssh/known_hosts

      - name: Deploy via scp through Jump Host using Password
        env:
          SSHPASS: ${{ secrets.TARGET_SERVER_PASSWORD }}
        run: |
          # Create the target directory first over the tunnel, as scp can fail if it doesn't exist
          sshpass -e ssh -o ProxyCommand="ssh -W %h:%p ${{ secrets.JUMP_HOST_USER }}@${{ secrets.JUMP_HOST_IP }}" \
            -o StrictHostKeyChecking=no \
            ${{ secrets.TARGET_SERVER_USER }}@${{ secrets.TARGET_SERVER_IP }} "mkdir -p ~/abc"

          # Use scp -r (recursive) with ProxyCommand to copy everything.
          # Note: scp doesn't have a native --exclude flag, so we use a temporary directory or standard globbing.
          # To keep it completely free of node_modules, we tar the local folder excluding node_modules, stream it, and unpack it.
          
          tar --exclude='node_modules' --exclude='.next' --exclude='.git' --exclude='.github' -czf - . | \
          sshpass -e ssh -o ProxyCommand="ssh -W %h:%p ${{ secrets.JUMP_HOST_USER }}@${{ secrets.JUMP_HOST_IP }}" \
            -o StrictHostKeyChecking=no \
            ${{ secrets.TARGET_SERVER_USER }}@${{ secrets.TARGET_SERVER_IP }} "tar -xzf - -C ~/abc"

      - name: Install Dependencies and Build on Target Server
        env:
          SSHPASS: ${{ secrets.TARGET_SERVER_PASSWORD }}
        run: |
          sshpass -e ssh -o ProxyCommand="ssh -W %h:%p ${{ secrets.JUMP_HOST_USER }}@${{ secrets.JUMP_HOST_IP }}" \
            -o StrictHostKeyChecking=no \
            ${{ secrets.TARGET_SERVER_USER }}@${{ secrets.TARGET_SERVER_IP }} << 'EOF'
              # Navigate into the deployment path
              cd ~/abc
              
              # Load NVM / Node.js environment if needed
              export NVM_DIR="$HOME/.nvm"
              [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
              
              # Install dependencies on the target server
              npm install
              
              # Build the Next.js application
              npm run build
              
              # Restart the application using PM2
              pm2 restart next-app || pm2 start npm --name "next-app" -- start
            EOF